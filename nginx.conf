server {
  listen 8082;
  root /usr/share/nginx/html;
  index index.html;

  # Manual publisher images are validated up to 20 MB by monitor-be.
  # Leave room for multipart framing instead of using nginx's 1 MB default.
  client_max_body_size 21m;

  location ^~ /monitor/api/ {
    proxy_pass http://127.0.0.1:8200/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /monitor/distributor-api/ {
    proxy_pass http://127.0.0.1:8210/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /monitor/submitter-api/ {
    proxy_pass http://127.0.0.1:8500/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /monitor/backupper-api/ {
    proxy_pass http://127.0.0.1:8219/api/;
    proxy_http_version 1.1;
    proxy_connect_timeout 30s;
    proxy_send_timeout 1800s;
    proxy_read_timeout 1800s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /monitor/minio/ {
    proxy_pass http://120.53.92.66:9000/;
    proxy_http_version 1.1;
    proxy_set_header Host 120.53.92.66:9000;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 7d;
    access_log off;
    try_files $uri =404;
  }

  location = /monitor {
    return 301 /monitor/;
  }

  location = /monitor/index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files /monitor/index.html =404;
  }

  location /monitor/ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri $uri/ /monitor/index.html;
  }
}
