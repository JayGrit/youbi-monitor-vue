name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: 服务器本地构建
    environment: prod
    runs-on: ubuntu-latest
    env:
      TXY_PRIVATE_KEY: ${{ secrets.TXY_PRIVATE_KEY }}
      TXY_HOST: 120.53.92.66
      TXY_USER: root
      TXY_PATH: /hoshuuch/youbi-monitor-vue
    steps:
      - name: 配置SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${TXY_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_ed25519
          printf '\n' >> ~/.ssh/id_ed25519
          ssh-keyscan -H ${TXY_HOST} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519

      - name: 远程构建并启动容器
        run: |
          ssh -i ~/.ssh/id_ed25519 -o ServerAliveInterval=30 -o ServerAliveCountMax=20 "${TXY_USER}@${TXY_HOST}" \
            "bash -s -- '${TXY_PATH}' '${GITHUB_SHA}'" << 'EOF'
          set -Eeuo pipefail
          TXY_PATH="$1"
          RELEASE_TAG="$2"

          exec 9>/var/lock/youbi-docker-deploy.lock
          flock -w 1800 9

          if [ ! -d "${TXY_PATH}/.git" ]; then
            rm -rf "${TXY_PATH}"
            git clone git@github.com:JayGrit/youbi-monitor-vue.git "${TXY_PATH}"
          fi

          cd "${TXY_PATH}"
          git fetch origin && git reset --hard origin/main
          printf 'nameserver 183.60.82.98\nnameserver 183.60.83.19\nnameserver 8.8.8.8\n' > /etc/resolv.conf
          OLD_IMAGE_ID="$(docker inspect -f '{{.Image}}' monitor-vue 2>/dev/null || true)"
          RELEASE_IMAGE="monitor-vue:${RELEASE_TAG}"

          if ! docker buildx inspect monitor-vue-builder >/dev/null 2>&1; then
            docker buildx create \
              --name monitor-vue-builder \
              --driver docker-container
          fi
          docker buildx inspect --bootstrap monitor-vue-builder
          docker buildx build \
            --builder monitor-vue-builder \
            --load \
            --label org.youbi.service=monitor-vue \
            --label "youbi.revision=${RELEASE_TAG}" \
            -t "${RELEASE_IMAGE}" \
            -t monitor-vue:latest \
            .

          docker rm -f monitor-vue-candidate || true
          docker run -d \
            --name monitor-vue-candidate \
            --restart no \
            -p 18082:8082 \
            "${RELEASE_IMAGE}"

          CANDIDATE_HEALTHY=false
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18082/monitor/ >/dev/null 2>&1; then
              CANDIDATE_HEALTHY=true
              break
            fi
            sleep 2
          done
          if [ "${CANDIDATE_HEALTHY}" != "true" ]; then
            docker logs monitor-vue-candidate --tail 100 || true
            docker rm -f monitor-vue-candidate || true
            exit 1
          fi
          docker rm -f monitor-vue-candidate

          docker rm -f monitor-vue || true
          docker run -d \
            --name monitor-vue \
            --network host \
            --restart unless-stopped \
            "${RELEASE_IMAGE}"

          MONITOR_VUE_HEALTHY=false
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8082/monitor/ >/dev/null 2>&1; then
              MONITOR_VUE_HEALTHY=true
              break
            fi
            sleep 2
          done
          if [ "${MONITOR_VUE_HEALTHY}" != "true" ]; then
            docker logs monitor-vue --tail 100 || true
            docker rm -f monitor-vue || true
            if [ -n "${OLD_IMAGE_ID}" ]; then
              echo "Rolling monitor-vue back to ${OLD_IMAGE_ID}"
              docker run -d \
                --name monitor-vue \
                --network host \
                --restart unless-stopped \
                "${OLD_IMAGE_ID}" || true
            fi
            exit 1
          fi

          NEW_IMAGE_ID="$(docker inspect -f '{{.Image}}' monitor-vue)"
          if [ -n "${OLD_IMAGE_ID}" ] && [ "${OLD_IMAGE_ID}" != "${NEW_IMAGE_ID}" ]; then
            docker image rm "${OLD_IMAGE_ID}" || true
          fi
          docker image prune -f --filter "until=24h" || true
          docker buildx prune -f \
            --builder monitor-vue-builder \
            --max-used-space 3gb \
            --reserved-space 1gb \
            || echo "Warning: docker buildx prune failed for monitor-vue-builder; deploy already completed."
          docker system df || true
          EOF
